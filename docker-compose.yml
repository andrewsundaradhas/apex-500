services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: apex-500-backend
    container_name: apex-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models_cache:/app/models_cache
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: apex-500-frontend
    container_name: apex-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
