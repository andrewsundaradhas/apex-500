app = "apex-500-backend"

primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Point SQLite + model cache at Fly volume
  APEX_DATA_DIR = "/data"
  APEX_MODELS_DIR = "/data/models_cache"
  # Strongly recommended
  APEX_ENV = "production"

[[mounts]]
  source = "apex_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

