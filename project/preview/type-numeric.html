<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }
  .cell { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.02em; color: var(--fg-tertiary); font-weight: 500; }
  .val-hero { font-family: var(--font-mono); font-size: 32px; font-weight: 500; letter-spacing: -0.01em; color: var(--fg-primary); font-variant-numeric: tabular-nums; line-height: 1.2; }
  .val-card { font-family: var(--font-mono); font-size: 24px; font-weight: 500; color: var(--fg-primary); font-variant-numeric: tabular-nums; line-height: 1.2; }
  .delta { font-family: var(--font-mono); font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .ticker { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0; color: var(--fg-primary); text-transform: uppercase; }
  .row-inline { display: flex; align-items: baseline; gap: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell">
      <span class="label">Hero metric</span>
      <span class="val-hero">5,218.47</span>
      <div class="row-inline">
        <span class="ticker">SPX</span>
        <span class="delta" style="color:#22C55E">+42.18 · +0.82%</span>
      </div>
    </div>
    <div class="cell">
      <span class="label">Card metric</span>
      <span class="val-card">5,264.10</span>
      <div class="row-inline">
        <span class="ticker">Next 5D</span>
        <span class="delta" style="color:#22C55E">+0.87%</span>
      </div>
    </div>
    <div class="cell">
      <span class="label">Negative delta</span>
      <span class="val-card" style="color:#F43F5E">−0.48%</span>
      <div class="row-inline">
        <span class="ticker">^VIX</span>
        <span class="delta" style="color:#A1A1AA">24.32</span>
      </div>
    </div>
  </div>
</body>
</html>
