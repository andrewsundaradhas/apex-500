<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .row { display: flex; align-items: baseline; gap: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; padding-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); width: 120px; flex-shrink: 0; }
  .demo { flex: 1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="meta">Inter 48 / 600</div><div class="demo h1">Forecast with signal.</div></div>
    <div class="row"><div class="meta">Inter 32 / 600</div><div class="demo h2">AI-powered S&amp;P 500</div></div>
    <div class="row"><div class="meta">Inter 20 / 600</div><div class="demo h3">Next-week projection</div></div>
    <div class="row"><div class="meta">Inter 16 / 600</div><div class="demo h4">Model confidence</div></div>
  </div>
</body>
</html>
