<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .swatch {
    display: flex; flex-direction: column; gap: 8px;
  }
  .chip {
    height: 64px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle);
  }
  .name { font-size: 12px; font-weight: 500; color: var(--fg-primary); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
  .role { font-size: 11px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="swatch">
      <div class="chip" style="background:#0C0C0E"></div>
      <div>
        <div class="role">Canvas</div>
        <div class="name">bg-canvas</div>
        <div class="hex">#0C0C0E</div>
      </div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#141416"></div>
      <div>
        <div class="role">Surface</div>
        <div class="name">bg-surface</div>
        <div class="hex">#141416</div>
      </div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#1C1C20"></div>
      <div>
        <div class="role">Elevated</div>
        <div class="name">bg-elevated</div>
        <div class="hex">#1C1C20</div>
      </div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#26262C"></div>
      <div>
        <div class="role">Overlay</div>
        <div class="name">bg-overlay</div>
        <div class="hex">#26262C</div>
      </div>
    </div>
  </div>
</body>
</html>
