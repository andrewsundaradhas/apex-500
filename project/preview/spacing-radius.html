<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .shape {
    width: 80px; height: 56px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
  }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><div class="shape" style="border-radius:6px"></div><span class="label">radius-sm</span><span class="px">6px · inputs, tags</span></div>
    <div class="cell"><div class="shape" style="border-radius:10px"></div><span class="label">radius-md</span><span class="px">10px · cards</span></div>
    <div class="cell"><div class="shape" style="border-radius:14px"></div><span class="label">radius-lg</span><span class="px">14px · modals</span></div>
    <div class="cell"><div class="shape" style="border-radius:20px"></div><span class="label">radius-xl</span><span class="px">20px · hero</span></div>
    <div class="cell"><div class="shape" style="border-radius:9999px; width:56px"></div><span class="label">radius-full</span><span class="px">pills, avatars</span></div>
  </div>
</body>
</html>
