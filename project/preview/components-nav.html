<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 24px; }
  .nav { width: 100%; background: var(--bg-canvas); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 8px; display: flex; flex-direction: column; gap: 2px; max-width: 220px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; color: var(--fg-secondary); cursor: pointer; transition: all 120ms; position: relative; }
  .item:hover { background: var(--bg-elevated); color: var(--fg-primary); }
  .item.active { background: var(--bg-elevated); color: var(--fg-primary); }
  .item.active::before { content: ''; position: absolute; left: -1px; top: 6px; bottom: 6px; width: 2px; background: var(--accent-primary); border-radius: 2px; box-shadow: 0 0 6px rgba(139, 92, 246,0.5); }
  .ico { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .kbd { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); padding: 1px 5px; background: var(--bg-overlay); border: 1px solid var(--border-subtle); border-radius: 3px; }
  .grp { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-tertiary); padding: 10px 10px 4px; font-weight: 500; }
</style>
</head>
<body>
  <div class="wrap" style="display:flex; justify-content:center">
    <nav class="nav">
      <div class="item active">
        <svg class="ico" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-7"/></svg>
        Dashboard
        <span class="kbd">D</span>
      </div>
      <div class="item">
        <svg class="ico" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 008.5 14.063l-6.135-1.582a.5.5 0 010-.962L8.5 9.936A2 2 0 009.937 8.5l1.582-6.135a.5.5 0 01.963 0L14.063 8.5A2 2 0 0015.5 9.937l6.135 1.581a.5.5 0 010 .964L15.5 14.063a2 2 0 00-1.437 1.437l-1.582 6.135a.5.5 0 01-.963 0z"/></svg>
        Predictions
        <span class="kbd">P</span>
      </div>
      <div class="item">
        <svg class="ico" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Insights
        <span class="kbd">I</span>
      </div>
      <div class="item">
        <svg class="ico" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5 2 7.5-6.5-5-6.5 5 2-7.5L2 9h7z"/></svg>
        Watchlist
      </div>
      <div class="grp">Models</div>
      <div class="item">
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
        LSTM
      </div>
      <div class="item">
        <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Transformer
      </div>
    </nav>
  </div>
</body>
</html>
