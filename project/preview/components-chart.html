<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 12px; }
  .head { display: flex; align-items: baseline; gap: 16px; }
  .ticker { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--fg-tertiary); letter-spacing: 0.04em; }
  .price { font-family: var(--font-mono); font-size: 26px; font-weight: 500; color: var(--fg-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1; }
  .delta { font-family: var(--font-mono); font-size: 13px; color: #22C55E; font-variant-numeric: tabular-nums; }
  .pill { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; background: rgba(139, 92, 246,0.12); color: #A78BFA; border-radius: 999px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: #8B5CF6; box-shadow: 0 0 6px rgba(139, 92, 246,0.6); }
  svg.chart { width: 100%; height: 140px; display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <span class="ticker">SPX · S&amp;P 500</span>
      <span class="price">5,218.47</span>
      <span class="delta">+42.18 · +0.82%</span>
      <span class="pill"><span class="dot"></span>AI on</span>
    </div>
    <svg class="chart" viewBox="0 0 660 140" preserveAspectRatio="none">
      <defs>
        <linearGradient id="priceFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(245,247,250,0.18)"/>
          <stop offset="100%" stop-color="rgba(245,247,250,0)"/>
        </linearGradient>
        <linearGradient id="predFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(139, 92, 246,0.35)"/>
          <stop offset="100%" stop-color="rgba(139, 92, 246,0)"/>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- grid -->
      <g stroke="rgba(30,35,48,0.7)" stroke-width="1">
        <line x1="0" y1="35" x2="660" y2="35"/>
        <line x1="0" y1="70" x2="660" y2="70"/>
        <line x1="0" y1="105" x2="660" y2="105"/>
      </g>
      <!-- price area -->
      <path d="M0 90 L40 85 L80 92 L120 78 L160 82 L200 70 L240 74 L280 60 L320 65 L360 52 L400 58 L440 45" fill="none" stroke="#EDEDEF" stroke-width="1.75" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M0 90 L40 85 L80 92 L120 78 L160 82 L200 70 L240 74 L280 60 L320 65 L360 52 L400 58 L440 45 L440 140 L0 140 Z" fill="url(#priceFill)"/>

      <!-- confidence band -->
      <path d="M440 45 L480 40 L520 32 L560 26 L600 22 L640 18 L640 58 L600 50 L560 48 L520 52 L480 54 L440 55 Z" fill="url(#predFill)"/>

      <!-- prediction line (dashed + glow) -->
      <path d="M440 45 L480 38 L520 30 L560 25 L600 20 L640 15" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round" filter="url(#glow)"/>

      <!-- now marker -->
      <line x1="440" y1="8" x2="440" y2="132" stroke="#46464E" stroke-width="1" stroke-dasharray="2 3"/>
      <circle cx="440" cy="45" r="3" fill="#EDEDEF"/>
      <circle cx="640" cy="15" r="3.5" fill="#8B5CF6"/>
      <circle cx="640" cy="15" r="6" fill="#8B5CF6" opacity="0.3"/>
    </svg>
  </div>
</body>
</html>
