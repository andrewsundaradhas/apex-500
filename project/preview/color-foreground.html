<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .row {
    background: var(--bg-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 96px;
  }
  .sample { font-size: 18px; font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
  .name { font-size: 11px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="name">Primary</span>
      <span class="sample" style="color:#EDEDEF">The trend is your friend</span>
      <span class="hex">#EDEDEF · fg-primary</span>
    </div>
    <div class="row">
      <span class="name">Secondary</span>
      <span class="sample" style="color:#A1A1AA">Market cap · 46.2T</span>
      <span class="hex">#A1A1AA · fg-secondary</span>
    </div>
    <div class="row">
      <span class="name">Tertiary</span>
      <span class="sample" style="color:#70707A">Closed at 16:00 ET</span>
      <span class="hex">#70707A · fg-tertiary</span>
    </div>
    <div class="row">
      <span class="name">Quaternary</span>
      <span class="sample" style="color:#46464E">Grid line / divider</span>
      <span class="hex">#46464E · fg-quaternary</span>
    </div>
  </div>
</body>
</html>
