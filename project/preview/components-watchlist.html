<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 0; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 14px; padding: 12px 20px; border-bottom: 1px solid var(--border-subtle); transition: background 120ms; cursor: pointer; }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--bg-elevated); }
  .row.active { background: var(--bg-elevated); position: relative; }
  .row.active::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; background: var(--accent-primary); border-radius: 2px; }
  .tk { font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: var(--fg-primary); width: 64px; }
  .name { font-size: 13px; color: var(--fg-secondary); flex: 1; }
  .price { font-family: var(--font-mono); font-size: 13px; color: var(--fg-primary); font-variant-numeric: tabular-nums; width: 90px; text-align: right; }
  .delta { font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums; width: 72px; text-align: right; }
  .spark { width: 64px; height: 22px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row active">
      <span class="tk">SPX</span>
      <span class="name">S&amp;P 500 Index</span>
      <svg class="spark" viewBox="0 0 64 22"><path d="M0 16 L8 14 L16 15 L24 11 L32 12 L40 8 L48 9 L56 5 L64 3" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="price">5,218.47</span>
      <span class="delta" style="color:#22C55E">+0.82%</span>
    </div>
    <div class="row">
      <span class="tk">NDX</span>
      <span class="name">Nasdaq 100</span>
      <svg class="spark" viewBox="0 0 64 22"><path d="M0 14 L8 12 L16 13 L24 10 L32 11 L40 7 L48 8 L56 4 L64 2" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="price">18,042.10</span>
      <span class="delta" style="color:#22C55E">+1.14%</span>
    </div>
    <div class="row">
      <span class="tk">DJI</span>
      <span class="name">Dow Jones</span>
      <svg class="spark" viewBox="0 0 64 22"><path d="M0 8 L8 10 L16 9 L24 12 L32 11 L40 14 L48 13 L56 16 L64 15" fill="none" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="price">38,914.72</span>
      <span class="delta" style="color:#F43F5E">−0.18%</span>
    </div>
    <div class="row">
      <span class="tk">VIX</span>
      <span class="name">Volatility Index</span>
      <svg class="spark" viewBox="0 0 64 22"><path d="M0 10 L8 9 L16 12 L24 11 L32 8 L40 10 L48 7 L56 9 L64 6" fill="none" stroke="#EAB308" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="price">24.32</span>
      <span class="delta" style="color:#EAB308">+3.20%</span>
    </div>
  </div>
</body>
</html>
