<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-canvas); }
  .wrap { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.02em; color: var(--fg-tertiary); width: 80px; flex-shrink: 0; }
  button { font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: var(--radius-sm); border: 1px solid transparent; padding: 8px 14px; display: inline-flex; align-items: center; gap: 6px; transition: all 120ms cubic-bezier(0.19,1,0.22,1); }
  .btn-primary { background: var(--accent-primary); color: white; }
  .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 16px rgba(139, 92, 246,0.45); }
  .btn-secondary { background: var(--bg-elevated); color: var(--fg-primary); border-color: var(--border-default); }
  .btn-secondary:hover { background: var(--bg-overlay); }
  .btn-ghost { background: transparent; color: var(--fg-secondary); }
  .btn-ghost:hover { background: var(--bg-elevated); color: var(--fg-primary); }
  .btn-danger { background: var(--bg-elevated); color: var(--neg); border-color: var(--border-default); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .ico { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="label">Primary</span>
      <button class="btn-primary">
        <svg class="ico" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 008.5 14.063l-6.135-1.582a.5.5 0 010-.962L8.5 9.936A2 2 0 009.937 8.5l1.582-6.135a.5.5 0 01.963 0L14.063 8.5A2 2 0 0015.5 9.937l6.135 1.581a.5.5 0 010 .964L15.5 14.063a2 2 0 00-1.437 1.437l-1.582 6.135a.5.5 0 01-.963 0z"/></svg>
        New prediction
      </button>
      <button class="btn-primary btn-sm">Run model</button>
    </div>
    <div class="row">
      <span class="label">Secondary</span>
      <button class="btn-secondary">Export CSV</button>
      <button class="btn-secondary btn-sm">1M</button>
    </div>
    <div class="row">
      <span class="label">Ghost</span>
      <button class="btn-ghost">Cancel</button>
      <button class="btn-ghost btn-sm">Reset view</button>
    </div>
    <div class="row">
      <span class="label">Danger</span>
      <button class="btn-danger">Delete forecast</button>
    </div>
  </div>
</body>
</html>
