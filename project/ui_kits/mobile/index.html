<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apex 500 — Mobile</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: #0A0B12; min-height: 100vh; }
  .stage {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px;
    padding: 40px; align-items: center; justify-items: center;
    background:
      radial-gradient(600px 400px at 20% 30%, rgba(139, 92, 246,0.12), transparent 70%),
      radial-gradient(500px 350px at 80% 70%, rgba(56, 189, 248,0.08), transparent 70%),
      #0C0C0E;
  }
  .label-sm { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 14px; }

  /* ===== Screen shared ===== */
  .screen { width: 100%; height: 100%; background: #0C0C0E; color: #EDEDEF; font-family: var(--font-sans); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .screen-scroll { flex: 1; overflow-y: auto; padding: 0 18px 100px; }

  /* Header block below status bar */
  .mhead { padding: 56px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
  .mhead .brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
  .mhead .brand .m { font-family: var(--font-mono); color: #8B5CF6; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #8B5CF6, #8B5CF6); display: grid; place-items: center; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: white; }

  /* === SCREEN 1 === */
  .hero-mcard { margin: 10px 18px 16px; padding: 20px; background: linear-gradient(145deg, rgba(139, 92, 246,0.14), rgba(14,17,24,0.95)); border: 1px solid rgba(139, 92, 246,0.3); border-radius: 20px; position: relative; overflow: hidden; }
  .hero-mcard::after { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(139, 92, 246,0.3), transparent 60%); filter: blur(20px); }
  .hero-mcard .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #A1A1AA; margin-bottom: 4px; font-weight: 500; display:flex; align-items:center; gap: 6px; }
  .live-dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; box-shadow: 0 0 8px #22C55E; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hero-mcard .ticker { display: flex; align-items: baseline; gap: 8px; }
  .hero-mcard .price { font-family: var(--font-mono); font-size: 36px; font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .hero-mcard .delta { color: #22C55E; font-family: var(--font-mono); font-size: 14px; font-variant-numeric: tabular-nums; }
  .hero-mcard svg { margin-top: 12px; width: 100%; height: 100px; }

  .range-tabs { display: flex; gap: 2px; margin: 12px 18px 16px; padding: 3px; background: rgba(20,23,32,0.8); border-radius: 10px; border: 1px solid #222226; }
  .range-tabs span { flex: 1; text-align: center; padding: 8px; font-family: var(--font-mono); font-size: 11px; color: #70707A; border-radius: 7px; cursor: pointer; letter-spacing: 0.02em; }
  .range-tabs span.on { background: rgba(139, 92, 246,0.15); color: #8B5CF6; box-shadow: 0 0 12px rgba(139, 92, 246,0.25); }

  .mcard { margin: 0 18px 12px; padding: 16px; background: #141416; border: 1px solid #222226; border-radius: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .mcard .hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .mcard .hd h4 { font-size: 12px; font-weight: 600; color: #EDEDEF; margin: 0; letter-spacing: 0.02em; text-transform: uppercase; }
  .mcard .hd .more { font-size: 11px; color: #70707A; }

  /* Prediction cards */
  .pred-row { display: flex; gap: 12px; overflow-x: auto; padding: 0 18px 8px; margin-bottom: 8px; scrollbar-width: none; }
  .pred-row::-webkit-scrollbar { display: none; }
  .pred { min-width: 150px; padding: 14px; background: #141416; border: 1px solid #222226; border-radius: 14px; position: relative; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .pred .hz { font-family: var(--font-mono); font-size: 10px; color: #8B5CF6; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  .pred .pv { font-family: var(--font-mono); font-size: 18px; font-weight: 500; margin: 6px 0; letter-spacing: -0.01em; }
  .pred .pd { font-family: var(--font-mono); font-size: 11px; color: #22C55E; }
  .pred .conf { margin-top: 10px; font-size: 10px; color: #70707A; display: flex; justify-content: space-between; align-items: center; }
  .pred .conf-ring { width: 22px; height: 22px; position: relative; }
  .pred .conf-ring svg { transform: rotate(-90deg); }
  .pred .conf-ring .n { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-mono); font-size: 8px; color: #EDEDEF; }

  /* Sector heatmap */
  .sector-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .sector { height: 40px; border-radius: 5px; padding: 6px; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
  .sector .s-n { font-family: var(--font-mono); font-size: 10px; color: white; font-weight: 500; }
  .sector .s-v { font-family: var(--font-mono); font-size: 9px; color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }

  /* Insights */
  .ins { padding: 14px 16px; background: #141416; border-left: 2px solid #8B5CF6; border-radius: 0 12px 12px 0; margin: 0 18px 10px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .ins.pos { border-left-color: #22C55E; }
  .ins .meta { font-family: var(--font-mono); font-size: 10px; color: #70707A; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .ins h5 { margin: 0 0 4px; font-size: 13px; font-weight: 600; }
  .ins p { margin: 0; font-size: 12px; color: #A1A1AA; line-height: 1.5; }

  /* Tab bar */
  .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(14,17,24,0.88); backdrop-filter: blur(24px) saturate(180%); border-top: 1px solid #222226; padding: 10px 12px 32px; display: flex; justify-content: space-around; z-index: 20; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #70707A; font-size: 10px; font-weight: 500; padding: 6px 14px; border-radius: 10px; transition: all 180ms; }
  .tab.on { color: #8B5CF6; background: rgba(139, 92, 246,0.08); }
  .tab svg { width: 22px; height: 22px; }

  /* === SCREEN 2 — Prediction detail === */
  .back-h { padding: 56px 20px 10px; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; color: #A1A1AA; }
  .back-h svg { width: 18px; height: 18px; }

  .ring-big { position: relative; width: 120px; height: 120px; margin: 12px auto; }
  .ring-big svg { transform: rotate(-90deg); }
  .ring-big .n { position: absolute; inset: 0; display: grid; place-items: center; flex-direction: column; text-align: center; }
  .ring-big .n .big { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: #EDEDEF; line-height: 1; }
  .ring-big .n .sm { font-size: 9px; color: #70707A; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  .stat-pill { padding: 12px 14px; background: #141416; border: 1px solid #222226; border-radius: 10px; text-align: center; }
  .stat-pill .k { font-size: 9px; color: #70707A; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-pill .v { font-family: var(--font-mono); font-size: 16px; color: #EDEDEF; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .stat-pill .v.pos { color: #22C55E; }

  .feat-ln { display: grid; grid-template-columns: 1fr 80px 40px; gap: 10px; align-items: center; font-size: 11px; margin-bottom: 10px; }
  .feat-ln .nm { color: #A1A1AA; }
  .feat-ln .bar { height: 4px; background: #1C1C20; border-radius: 2px; position: relative; overflow: hidden; }
  .feat-ln .bar::after { content:''; position: absolute; left: 0; top: 0; bottom: 0; width: var(--w); background: linear-gradient(90deg, #8B5CF6, #818CF8); border-radius: 2px; box-shadow: 0 0 4px rgba(139, 92, 246,0.4); }
  .feat-ln .vn { font-family: var(--font-mono); color: #EDEDEF; text-align: right; font-variant-numeric: tabular-nums; }

  /* === SCREEN 3 — Watchlist + insights feed === */
  .wl-row { display: flex; align-items: center; padding: 12px 16px; background: #141416; border: 1px solid #222226; border-radius: 12px; margin-bottom: 8px; }
  .wl-row .l { flex: 1; }
  .wl-row .tk { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #EDEDEF; }
  .wl-row .nm { font-size: 11px; color: #70707A; margin-top: 1px; }
  .wl-row .r { text-align: right; }
  .wl-row .pr { font-family: var(--font-mono); font-size: 13px; color: #EDEDEF; font-variant-numeric: tabular-nums; }
  .wl-row .dt { font-family: var(--font-mono); font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .wl-row svg.sp { width: 60px; height: 24px; margin: 0 14px; }

  .section-h { font-size: 11px; color: #70707A; text-transform: uppercase; letter-spacing: 0.06em; margin: 18px 18px 8px; font-weight: 500; }

  /* Sentiment gauge */
  .gauge-card { margin: 0 18px 12px; padding: 18px; background: #141416; border: 1px solid #222226; border-radius: 16px; text-align: center; }
  .gauge-card .gk { font-size: 11px; color: #70707A; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .gauge-card svg { width: 100%; max-width: 260px; height: 90px; }
  .gauge-card .gv { font-family: var(--font-mono); font-size: 20px; color: #22C55E; font-weight: 500; margin-top: -26px; }
  .gauge-card .gl { font-size: 11px; color: #A1A1AA; margin-top: 2px; }
</style>
</head>
